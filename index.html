<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海外サッカー 日程</title>
</head>
<body>

<script>
// (定数・マスタ定義部分はそのまま維持してください)

// データをレンダリングする関数を以下のように書き換えてください
function renderMatches(data) {
  let html = "";
  if (!data || data.length === 0) {
    document.getElementById("content").innerHTML = '<div class="empty">試合予定はありません</div>';
    return;
  }

  // 日付ごとにグループ化
  const grouped = {};
  data.forEach(m => {
    // --- ここに除外処理を追加 ---
    if (m.league === "Copa America") return; 
    // -------------------------

    const date = m.kickoffUTC.split('T');
    if (!grouped[date]) grouped[date] = [];
    grouped[date].push(m);
  });

  Object.keys(grouped).sort().forEach(date => {
    const matches = grouped[date];
    const isToday = (new Date().toISOString().split('T') === date);
    
    html += `<div class="day-header">
      <span class="day-label ${isToday?'today':''}">${date.replace(/-/g,'/')}</span>
      <div class="day-hr"></div>
      <span class="day-count">${matches.length}試合</span>
    </div>`;

    matches.forEach((m, i) => {
      const config = LEAGUE_CONFIG[m.league] || { tab: "national", gender: "male", national: true };
      
      // タブ・フィルタリングの判定
      if (currentTab !== "all" && config.tab !== currentTab) return;
      if (currentGender !== "all" && config.gender !== currentGender) return;
      if (currentLeague !== "all" && m.league !== currentLeague) return;

      const jstTime = new Date(new Date(m.kickoffUTC).getTime() + 9*60*60*1000)
                        .toISOString().slice(11, 16);
      
      const homeJa = TEAM_JA[m.home] || m.home;
      const awayJa = TEAM_JA[m.away] || m.away;
      const leagueJa = LEAGUE_JA[m.league] || m.league;
      const lClass = m.lClass || "l-champ";

      const hCrestUrl = TEAM_CREST[m.home] || m.homeCrest;
      const aCrestUrl = TEAM_CREST[m.away] || m.awayCrest;

      const hCrest = hCrestUrl ? `<img class="crest" src="${hCrestUrl}" alt="">` : "";
      const aCrest = aCrestUrl ? `<img class="crest" src="${aCrestUrl}" alt="">` : "";

      const pHtml = (m.japanese && m.japanese.length > 0)
        ? `<div class="m-right">${m.japanese.map(n=>`<span class="p-tag">${PLAYER_JA[n]||n}</span>`).join("")}</div>`
        : "";

      html += `<div class="match-row">
        <div class="m-time"><div class="m-kick">${jstTime}</div></div>
        <div class="m-main">
          <div class="m-top">
            <span class="l-badge ${lClass}">${leagueJa}</span>
            <div class="m-teams-inline">
              <span class="team-cell right">${hCrest}${homeJa}</span>
              <span class="m-vs">vs</span>
              <span class="team-cell">${aCrest}${awayJa}</span>
            </div>
          </div>
          ${pHtml}
        </div>
      </div>`;
    });
  });

  document.getElementById("content").innerHTML = html || '<div class="empty">該当する試合はありません</div>';
}
</script>
</body>
</html>
