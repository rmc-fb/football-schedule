<!-- ▼ この関数を丸ごと置き換え ▼ -->
<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// UI 制御
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const GENDER_TABS = ["europe","japanese","national","north","youth"];
const FILTER_TABS = ["europe","middle","north"];

/**
 * タブごとのリーグ一覧を
 * 現在の gender に応じて返す
 */
function getFilteredTabLeagues(tab) {
  const list = TAB_LEAGUES[tab] || [];

  return list.filter(item => {
    const cfg = LEAGUE_CONFIG[item.v];

    // gender指定なしは表示
    if (!cfg || !cfg.gender) return true;

    return cfg.gender === currentGender;
  });
}

function updateUI() {
  document.querySelectorAll(".main-nav button")
    .forEach(b => b.classList.remove("active"));

  const activeBtn = document.getElementById("tab-" + currentTab);
  if (activeBtn) activeBtn.classList.add("active");

  // ── Gender Toggle ──
  const gBar = document.getElementById("genderBar");

  gBar.style.display =
    GENDER_TABS.includes(currentTab) ? "" : "none";

  document.getElementById("gBtn-male")
    .classList.toggle("active", currentGender === "male");

  document.getElementById("gBtn-female")
    .classList.toggle("active", currentGender === "female");

  // ── League Filter ──
  const fBar = document.getElementById("filterBar");

  if (FILTER_TABS.includes(currentTab)) {
    fBar.style.display = "";
    rebuildLeagueSelect();
  } else {
    fBar.style.display = "none";
  }
}

function rebuildLeagueSelect() {
  const sel = document.getElementById("leagueSel");

  // ▼ gender対応版
  const options = getFilteredTabLeagues(currentTab);

  let html = `<option value="all">全リーグ</option>`;

  options.forEach(o => {
    html += `
      <option value="${o.v}">
        ${o.l}
      </option>
    `;
  });

  sel.innerHTML = html;

  // 現在の選択リーグが存在しない場合はリセット
  const exists = options.some(o => o.v === fLeague);

  if (!exists) {
    fLeague = "all";
  }

  sel.value = fLeague;
}

function setTab(tab) {
  currentTab = tab;

  // タブ変更時はリーグフィルタリセット
  fLeague = "all";

  history.replaceState(null, '', '#' + tab);

  updateUI();
  render();
}

function setGender(g) {
  currentGender = g;

  // ▼ gender変更時、
  // リーグ選択もリセット
  fLeague = "all";

  updateUI();
  render();
}

function applyFilter() {
  fLeague = document.getElementById("leagueSel").value;
  render();
}

function resetFilter() {
  fLeague = "all";
  document.getElementById("leagueSel").value = "all";
  render();
}
</script>
