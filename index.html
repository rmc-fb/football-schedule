<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// UI 制御
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const GENDER_TABS = ["europe","japanese","national","north","youth"];
const FILTER_TABS = ["europe","middle","north"];

function getFilteredTabLeagues(tab) {
  const list = TAB_LEAGUES[tab] || [];

  return list.filter(item => {
    if (!item || !item.v) return false;

    const cfg = LEAGUE_CONFIG[item.v];

    if (!cfg || !cfg.gender) return true;

    return cfg.gender === currentGender;
  });
}

function updateUI() {

  document.querySelectorAll(".main-nav button")
    .forEach(b => b.classList.remove("active"));

  const activeBtn =
    document.getElementById("tab-" + currentTab);

  if (activeBtn) {
    activeBtn.classList.add("active");
  }

  const gBar = document.getElementById("genderBar");

  gBar.style.display =
    GENDER_TABS.includes(currentTab)
      ? ""
      : "none";

  document.getElementById("gBtn-male")
    .classList.toggle(
      "active",
      currentGender === "male"
    );

  document.getElementById("gBtn-female")
    .classList.toggle(
      "active",
      currentGender === "female"
    );

  const fBar = document.getElementById("filterBar");

  if (FILTER_TABS.includes(currentTab)) {
    fBar.style.display = "";
    rebuildLeagueSelect();
  } else {
    fBar.style.display = "none";
  }
}

function rebuildLeagueSelect() {

  const sel =
    document.getElementById("leagueSel");

  if (!sel) return;

  const options =
    getFilteredTabLeagues(currentTab);

  let html =
    `<option value="all">全リーグ</option>`;

  options.forEach(o => {
    html +=
      `<option value="${o.v}">${o.l}</option>`;
  });

  sel.innerHTML = html;

  const exists =
    options.some(o => o.v === fLeague);

  if (!exists) {
    fLeague = "all";
  }

  sel.value = fLeague;
}

function setTab(tab, el) {

  currentTab = tab;

  fLeague = "all";

  history.replaceState(
    null,
    '',
    '#' + tab
  );

  updateUI();

  render();
}

function setGender(g, el) {

  currentGender = g;

  fLeague = "all";

  updateUI();

  render();
}

function applyFilter() {

  const sel =
    document.getElementById("leagueSel");

  if (!sel) return;

  fLeague = sel.value;

  render();
}

function resetFilter() {

  fLeague = "all";

  const sel =
    document.getElementById("leagueSel");

  if (sel) {
    sel.value = "all";
  }

  render();
}

  fLeague = "all";

  const sel = document.getElementById("leagueSel");

  if (sel) {
    sel.value = "all";
  }

  render();
}
</script>
