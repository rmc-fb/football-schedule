name: Fetch Players

on:
  schedule:
    # 毎月1日 07:00 JST (= 前日 22:00 UTC)
    - cron: '0 22 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch players
        run: node scripts/fetch_players.js
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/players.json
          git diff --cached --quiet || git commit -m "chore: update players data [$(date +'%Y-%m-%d')]"
          git pull --rebase origin main
          git push
