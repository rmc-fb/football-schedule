name: Fetch Matches
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Fetch matches only
        run: node scripts/fetch.js
        env:
          DAIHYO: ${{ secrets.DAIHYO }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          SPORTDB_KEY: ${{ secrets.SPORTDB_KEY }}
          FETCH_MODE: matches
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/matches.json
          git diff --cached --quiet || git commit -m "Update matches data"
          git pull --rebase origin main
          git push
